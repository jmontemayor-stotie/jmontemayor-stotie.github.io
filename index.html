<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jodi Portfolio</title>

  <style>
    /* RESET */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    /* BACKGROUND ANIMATION */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, #f4f5fe, #4b9a7d, #22c55e);
      animation: bgMove 10s infinite alternate;
      z-index: -1;
    }

    @keyframes bgMove {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(-25%, -25%);
      }
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      position: fixed;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: bold;
    }

    .nav-links a {
      margin-left: 25px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #a7f3d0;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* GLASS CARD */
    .glass {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    /* PROFILE */
    .circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: auto;
      margin-bottom: 20px;
    }

    /* TEXT */
    .subtitle {
      opacity: 0.8;
    }

    /* SKILLS */
    .skills span {
      border: 1px solid white;
      padding: 8px 15px;
      border-radius: 20px;
      margin: 5px;
      display: inline-block;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 25px;
      background: #22c55e;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
    }

    /* SECTIONS */
    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <h2 class="logo">Jodi</h2>
    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

  <!-- HERO -->
  <section id="home" class="hero">
    <div class="glass">
      <div class="circle">JM</div>
      <h1>Jodi Montemayor</h1>
      <p class="subtitle">IT Student • Future Web Developer</p>

      <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>Python</span>
      </div>

      <a href="#projects" class="btn">View Projects</a>
    </div>
  </section>

 <section id=" About" class="section"
 

  <!-- PROJECTS -->
  <section id="projects" class="section">
    <h2>Projects</h2>

    <div class="card">
      💍 <b>Likhana Jewelry Website</b><br>
      Elegant jewelry shop design
    </div>

    <div class="card">
      🌐 <b>Portfolio Website</b><br>
      Personal portfolio project
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="section">
    <h2>Contact</h2>
    <div class="card">
      📧 jodimontemayor041@gmail.com<br>
      📱 09123456789
    </div>
  </section>

</body>

</html>
